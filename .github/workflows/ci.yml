name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: Typecheck, lint, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # expo-env.d.ts is gitignored (per Expo's own convention) and normally
      # regenerated as a side effect of running any `npx expo` command. CI
      # never does that, so tsc would otherwise fail to resolve the
      # `expo/types` reference that provides CSS/CSS-module import types.
      - run: echo '/// <reference types="expo/types" />' > expo-env.d.ts
      - run: npx tsc --noEmit
      - run: npx expo lint
      - run: npx jest

  database:
    name: pgTAP (RLS / constraints / RPC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Applies every file in supabase/migrations/ to a fresh local Postgres,
      # then runs every *.sql file in supabase/tests/database/ against it.
      # Fully self-contained — no link to the real project, no secrets.
      - run: supabase start
      - run: supabase test db
